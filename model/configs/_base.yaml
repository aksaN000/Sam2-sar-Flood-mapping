dataset:
  sen1floods11_root: ./data/sen1floods11
  polarimetric_mode: ratio
model:
  backbone: sam2-hiera-bp
  peft: lora
  rank: 8
  adaptformer_dim: 64
  mask_decoder_strategy: lora-r4
  use_memory: false
train:
  seed: 42
  finetune_epochs: 10
  batch_size: 1
  grad_accum: 4
  precision: 16-mixed
  num_workers: 2
  optimizer:
    name: adamw
    lr_adapter: 0.0001
    lr_unfrozen: 1.0e-05
    weight_decay: 0.01
    betas:
    - 0.9
    - 0.999
  scheduler:
    warmup_steps: 200
    schedule: cosine
  loss:
    dice_weight: 1.0
    bce_weight: 1.0
eval:
  test_splits:
  - test
  - bolivia
  - pakistan
  ece_bins: 15
confidence:
  mode: none
  mc_passes: 20
  ensemble_seeds:
  - 42
  - 123
  - 20025
  - 7
  - 2024
logging:
  wandb_mode: offline
  wandb_project: sam2-sar-flood
  output_dir: runs
